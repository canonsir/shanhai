[project]
name = "shanhai-tools"
version = "0.1.0"
description = "ShanHai Tool Registry — 统一的 Tool 接口与注册机制"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shanhai_tools"]
