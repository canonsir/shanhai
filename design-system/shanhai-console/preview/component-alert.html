<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<title>Alert · 山海</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);font-size:14px;line-height:1.4}
  .stack{display:flex;flex-direction:column;gap:14px;max-width:560px}
  .label{font:600 11px/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground);margin-top:8px}

  .alert{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;border:1px solid transparent;border-radius:12px}
  .alert .ic{width:18px;height:18px;flex:none;margin-top:1px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .alert .body{flex:1;min-width:0}
  .alert .ttl{font-weight:600;margin-bottom:2px}
  .alert .msg{font-size:13px;opacity:.92}
  .alert .act{border:0;background:transparent;color:inherit;font:600 13px var(--font-sans);cursor:pointer;text-decoration:underline;padding:0;align-self:center;white-space:nowrap}

  .info{background:color-mix(in srgb,var(--primary) 9%,transparent);border-color:color-mix(in srgb,var(--primary) 22%,transparent);color:var(--foreground)}
  .info .ic{color:var(--primary)}
  .success{background:color-mix(in srgb,var(--chart-2) 10%,transparent);border-color:color-mix(in srgb,var(--chart-2) 24%,transparent);color:var(--foreground)}
  .success .ic{color:var(--chart-2)}
  .warning{background:color-mix(in srgb,var(--warning) 12%,transparent);border-color:color-mix(in srgb,var(--warning) 26%,transparent);color:var(--foreground)}
  .warning .ic{color:var(--warning)}
  .destructive{background:color-mix(in srgb,var(--destructive) 10%,transparent);border-color:color-mix(in srgb,var(--destructive) 26%,transparent);color:var(--foreground)}
  .destructive .ic{color:var(--destructive)}
  .outline{background:var(--background);border-color:var(--border);color:var(--foreground)}
  .outline .ic{color:var(--muted-foreground)}
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></symbol>
  <symbol id="check" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></symbol>
  <symbol id="alert" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><path d="M10.3 4.3 2.7 18a1.5 1.5 0 0 0 1.3 2.3h16a1.5 1.5 0 0 0 1.3-2.3L13.7 4.3a1.5 1.5 0 0 0-2.6 0Z"/></symbol>
</svg>

<div class="stack">
  <span class="label">Soft · 带标题</span>

  <div class="alert warning">
    <svg class="ic"><use href="#alert"/></svg>
    <div class="body"><div class="ttl">已降级数据源</div><div class="msg">Tushare 积分不足，本次查询已自动切换至 EastMoney 免费数据源。</div></div>
    <button class="act">查看详情</button>
  </div>

  <div class="alert info">
    <svg class="ic"><use href="#info"/></svg>
    <div class="body"><div class="msg">部分数据来自本地缓存，最新抓取时间 2026-06-29 14:02。</div></div>
  </div>

  <div class="alert success">
    <svg class="ic"><use href="#check"/></svg>
    <div class="body"><div class="msg">已完成 600519 全量事实落库，共 128 条。</div></div>
  </div>

  <div class="alert destructive">
    <svg class="ic"><use href="#alert"/></svg>
    <div class="body"><div class="ttl">实体解析冲突</div><div class="msg">检测到两条候选 ListedEntity 指向同一 Company，请人工确认。</div></div>
    <button class="act">前往处理</button>
  </div>

  <span class="label">Outline · 轮廓</span>
  <div class="alert outline">
    <svg class="ic"><use href="#info"/></svg>
    <div class="body"><div class="msg">该视图用于反向验证知识模型的表达力，非生产行情终端。</div></div>
  </div>
</div>
</body>
</html>
