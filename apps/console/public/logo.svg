<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="peakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Sea/Wave Base (Static Minimalist) -->
  <path d="M20 160 C 60 140, 140 180, 180 160" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Overlapping Mountain Peaks (Data representation) -->
  <path d="M40 160 L80 80 L120 160 Z" fill="url(#peakGrad)">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M80 160 L120 60 L160 160 Z" fill="url(#peakGrad)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- The Rising Trend Line (Sharp AI insight) -->
  <path d="M30 140 L70 110 L110 120 L150 50" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" from="0,500" to="500,0" dur="2s" fill="freeze"/>
  </path>

  <!-- AI Pulse Point -->
  <circle cx="150" cy="50" r="6" fill="#ef4444">
    <animate attributeName="r" values="5;9;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
