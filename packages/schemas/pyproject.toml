[project]
name = "shanhai-schemas"
version = "0.1.0"
description = "ShanHai 共享数据契约（Pydantic schemas）"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shanhai_schemas"]
